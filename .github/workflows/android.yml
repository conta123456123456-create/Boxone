name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3

      - run: npm install -g cordova

      - run: cordova create app com.sandbox.app Sandbox
      - run: cd app && cordova platform add android

      - run: cp ../index.html app/www/index.html

      - run: cd app && cordova build android

      - uses: actions/upload-artifact@v3
        with:
          name: apk
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
